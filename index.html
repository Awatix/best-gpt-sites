    search: document.getElementById("search"),
    count: document.getElementById("count"),
  };

  let activeTab = "all";
  let visibleCount = 8;
  const LOAD_STEP = 16;
  let currentSort = "default";

  function badgeClass(text){
    const t = String(text || "").toLowerCase();
    if(t.includes("new")) return "b-new";
    if(t.includes("popular")) return "b-pop";
    if(t.includes("mobile")) return "b-app";
    if(t.includes("+") || t.includes("deal")) return "b-deal";
    return "";
  }

  function buildLink(site){
    if(site.affiliateTemplate){
      const code = site.affiliateCode ?? GLOBAL_AFFILIATE_CODE ?? "";
      return site.affiliateTemplate.replaceAll("{code}", encodeURIComponent(code));
    }
    return site.url || "#";
  }

  function starsHTML(rating){
    const full = Math.max(0, Math.min(5, Number(rating)||0));
    let html = "";
    for(let i=1;i<=5;i++){
      html += `<span class="star ${i<=full ? "" : "off"}">⭐</span>`;
    }
    return html;
  }

  function escapeHTML(str){
    return String(str ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }
  function escapeAttr(str){ return escapeHTML(str); }

  function extractRate(desc){
  const text = String(desc || "");
  const nums = text.match(/\d{2,3}/g);
  if(!nums) return 0;
  return Math.max(...nums.map(n => Number(n)));
}

function renderGrid(){
  const q = (els.search.value || "").trim().toLowerCase();

  const filtered = SITES
    .filter(tab.filter)
    .filter(s=>{
      if(!q) return true;
      const hay = [
        s.name, s.desc,
        ...(s.badges||[]),
        ...(s.tags||[])
      ].join(" ").toLowerCase();
      return hay.includes(q);
    });

  if(currentSort === "rating"){
    filtered.sort((a,b)=> (b.rating || 0) - (a.rating || 0));
  } else if(currentSort === "rates"){
    filtered.sort((a,b)=>{
      const rateA = extractRate(a.desc);
      const rateB = extractRate(b.desc);
      return rateB - rateA;
    });
  }

  const visibleSites = filtered.slice(0, visibleCount);

  els.count.textContent = `${filtered.length} ${filtered.length===1 ? "Site" : "Sites"}`;

  els.grid.innerHTML = visibleSites.map(s => `

      <div class="name">${escapeHTML(s.name)}</div>
      <div class="desc">${escapeHTML(s.desc || "")}</div>

      <div class="stars">${starsHTML(s.rating)}</div>

      <div class="spacer"></div>

      <a class="btn" href="${escapeAttr(buildLink(s))}" target="_blank" rel="noopener noreferrer">
        Visit Site ↗
      </a>
    </div>
  `).join("");

  const old = document.getElementById("loadMoreWrap");
  if(old) old.remove();

  if (visibleCount < filtered.length) {
    els.grid.insertAdjacentHTML("afterend", `
      <div style="text-align:center; margin-top:25px;" id="loadMoreWrap">
        <button id="loadMoreBtn" class="btn" style="max-width:240px; margin:auto;">
          Show More
        </button>
      </div>
    `);

    document.getElementById("loadMoreBtn").addEventListener("click", ()=>{
      visibleCount += LOAD_STEP;
      renderGrid();
    });
  }
}

  els.search.addEventListener("input", ()=>{
    visibleCount = 8;
    renderGrid();
  });

const y = document.getElementById("year");
if (y) y.textContent = new Date().getFullYear();

  renderNav();
  renderGrid();



document.getElementById("sortSelect").addEventListener("change", (e)=>{
  currentSort = e.target.value;
  visibleCount = 8;
  renderGrid();
});

</script>
</body>

</html>
